name: X Auto Post

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'   # JST 07:00
    - cron: '0 3 * * *'    # JST 12:00
    - cron: '0 11 * * *'   # JST 20:00
    - cron: '0 13 * * *'   # JST 22:00

jobs:
  post-0700:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 22 * * *'
    runs-on: ubuntu-latest
    env:
      API_KEY: ${{ secrets.API_KEY }}
      API_SECRET: ${{ secrets.API_SECRET }}
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
      ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
      TEST_MODE: ${{ secrets.TEST_MODE }}
      SLOT: "07:00"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Fix git permissions
        run: sudo chown -R runner:runner . && chmod -R u+rwX .
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: Run X auto post
        run: node post_once.js

  post-1200:
    if: github.event.schedule == '0 3 * * *'
    runs-on: ubuntu-latest
    env:
      API_KEY: ${{ secrets.API_KEY }}
      API_SECRET: ${{ secrets.API_SECRET }}
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
      ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
      TEST_MODE: ${{ secrets.TEST_MODE }}
      SLOT: "12:00"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
