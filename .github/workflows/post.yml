name: X Auto Post

on:
  workflow_dispatch:
  schedule:
    - cron:
  workflow_dispatch: '0 22 * * *'
    - cron:
  workflow_dispatch: '0 3 * * *'
    - cron:
  workflow_dispatch: '0 11 * * *'

jobs:
  post:
    runs-on:
  workflow_dispatch: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version:
  workflow_dispatch: '18'
      - run: npm install
      - run: node auto_post.js
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_SECRET: ${{ secrets.API_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          TEST_MODE: ${{ secrets.TEST_MODE }}
